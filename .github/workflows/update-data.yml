name: 🔄 Update Crypto Data

on:
  # 每4小时自动运行
  schedule:
    - cron: '0 */4 * * *'

  # 支持手动触发
  workflow_dispatch:

  # 推送到 main 分支时也运行（用于测试）
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  update-data:
    name: 采集数据并部署
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允许推送到仓库

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python 环境 ───────────────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 安装依赖 ──────────────────────────────────────────
      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      # ── 4. 运行数据采集脚本 ──────────────────────────────────
      - name: 🔍 Collect crypto data
        env:
          # 所有 API Key 通过 GitHub Secrets 安全注入
          # 在 Settings → Secrets and variables → Actions 中配置
          COINGECKO_API_KEY:    ${{ secrets.COINGECKO_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          ETHERSCAN_API_KEY:    ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          python scripts/collect_data.py

      # ── 5. 验证输出 ──────────────────────────────────────────
      - name: ✅ Validate output
        run: |
          python -c "
          import json, sys
          with open('docs/data.json', 'r') as f:
              data = json.load(f)
          coins = data.get('coins', [])
          print(f'✓ data.json valid — {len(coins)} coins, updated at {data[\"updated_at\"]}')
          if not coins:
              print('⚠ Warning: No coins in data.json')
              sys.exit(1)
          "

      # ── 6. 提交并推送更新的 data.json ────────────────────────
      - name: 📤 Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data.json

          # 只有数据有变化时才提交
          if git diff --cached --quiet; then
            echo "ℹ No changes to data.json, skipping commit"
          else
            git commit -m "🔄 Auto-update crypto data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✓ Data pushed successfully"
          fi

      # ── 7. 错误通知（可选，需要配置 Slack/Discord Webhook）───
      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "Data collection failed at $(date -u)"
          # 可在此添加 Slack/Discord 通知
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Crypto Pulse data update failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
