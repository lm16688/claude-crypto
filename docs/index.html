<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Pulse — 加密货币热点监控</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="noise-overlay"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-pulse"></span>
        <div>
          <h1 class="logo-text">CRYPTO<span class="accent">PULSE</span></h1>
          <p class="logo-sub">加密货币热点雷达</p>
        </div>
      </div>
      <div class="header-meta">
        <div class="live-badge">
          <span class="dot-live"></span> LIVE
        </div>
        <div class="update-time">
          <span class="label">最后更新</span>
          <span id="last-update">--</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <div class="tab-inner">
      <button class="tab-btn active" data-tab="mainstream">
        <span class="tab-icon">◈</span> 主流币
        <span class="tab-count" id="mainstream-count">0</span>
      </button>
      <button class="tab-btn" data-tab="meme">
        <span class="tab-icon">⬡</span> Meme 币
        <span class="tab-count" id="meme-count">0</span>
      </button>
      <div class="tab-indicator"></div>
    </div>
  </nav>

  <!-- Filter & Search Bar -->
  <div class="controls-bar">
    <div class="controls-inner">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="搜索币种..." class="search-input" />
      </div>
      <div class="sort-wrap">
        <span class="sort-label">排序：</span>
        <select id="sort-select" class="sort-select">
          <option value="heat">热度优先</option>
          <option value="market_cap">市值优先</option>
          <option value="trend">涨幅优先</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Loading state -->
    <div id="loading-state" class="loading-state">
      <div class="loader-ring"></div>
      <p>正在加载最新数据...</p>
    </div>

    <!-- Error state -->
    <div id="error-state" class="error-state hidden">
      <div class="error-icon">⚠</div>
      <p id="error-msg">数据加载失败，请稍后刷新。</p>
    </div>

    <!-- Coin grid -->
    <div id="coin-grid" class="coin-grid hidden"></div>
  </main>

  <!-- Coin Detail Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-panel">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>数据来源：CoinGecko · X Platform · NewsAPI &nbsp;|&nbsp; 仅供参考，不构成投资建议</p>
    <p>© 2025 CryptoPulse · 每4小时自动更新</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
